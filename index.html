<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nico & Cris Cloud</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #000000;
      --secondary: #f2f2f7;
      --accent: #007aff;
      --success: #34c759;
      --danger: #ff3b30;
      --bg: #f8f9fa;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    body { background-color: var(--bg); color: #1c1c1e; padding-bottom: 80px; }

    .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }
    
    /* Vistas */
    .view { display: none; }
    .view.active { display: block; }

    header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 22px; font-weight: 800; }
    
    .month-select { border: none; background: white; padding: 8px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* Tarjetas */
    .card { background: white; border-radius: var(--radius); padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .stat-label { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 24px; font-weight: 800; margin-top: 5px; }

    /* Lista de Movimientos */
    .movement-item { padding: 15px 0; border-bottom: 1px solid #f2f2f7; display: flex; justify-content: space-between; align-items: center; }
    .m-info { display: flex; flex-direction: column; }
    .m-name { font-weight: 600; font-size: 15px; }
    .m-date { font-size: 11px; color: #8e8e93; margin-top: 2px; }
    .m-amount { font-weight: 700; font-size: 15px; }

    /* Navegación Inferior */
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #e5e5e7; z-index: 1000; }
    .nav-item { border: none; background: none; color: #8e8e93; font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 20px; }

    /* Botón Flotante */
    .fab { position: fixed; bottom: 85px; right: 20px; background: var(--primary); color: white; width: 56px; height: 56px; border-radius: 28px; border: none; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 900; }

    /* Modales */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 28px; padding: 25px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #8e8e93; margin-bottom: 5px; }
    .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e5e5e7; background: var(--secondary); font-size: 15px; outline: none; }
    
    .chart-container { position: relative; height: 250px; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- VISTA 1: MOVIMIENTOS -->
    <div id="view-list" class="view active">
      <header>
        <h1>Mis Cuentas ☁️</h1>
        <select id="month-selector" class="month-select" onchange="fetchData()"></select>
      </header>

      <div class="card" style="background: var(--primary); color: white;">
        <span class="stat-label" style="color: rgba(255,255,255,0.6)">Balance del Mes</span>
        <div class="stat-value" id="total-balance">$0</div>
      </div>

      <div class="card">
        <div id="movement-list">Cargando...</div>
      </div>
    </div>

    <!-- VISTA 2: INDICADORES -->
    <div id="view-stats" class="view">
      <header>
        <h1>Estadísticas 📊</h1>
      </header>

      <div class="card">
        <span class="stat-label">¿En qué gastamos más?</span>
        <div class="chart-container">
          <canvas id="pieChart"></canvas>
        </div>
      </div>

      <div class="card">
        <span class="stat-label">Histórico (Ingresos vs Gastos)</span>
        <div class="chart-container">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <div id="extra-stats"></div>
    </div>

  </div>

  <!-- Botón Flotante para agregar -->
  <button class="fab" onclick="toggleModal('modal-add', true)">+</button>

  <!-- Navegación -->
  <nav class="nav-bar">
    <button class="nav-item active" onclick="switchView('list', this)">
      <span class="nav-icon">💸</span>
      <span>Gastos</span>
    </button>
    <button class="nav-item" onclick="switchView('stats', this)">
      <span class="nav-icon">📈</span>
      <span>Indicadores</span>
    </button>
  </nav>

  <!-- Modal: Agregar -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal-content">
      <h2 style="margin-bottom:20px">Nuevo Registro</h2>
      <div class="input-group">
        <label>Categoría</label>
        <select id="main-category">
          <option value="Sueldo">💰 Sueldo (Ingreso)</option>
          <option value="Supermercado">🛒 Supermercado</option>
          <option value="Arriendo">🏠 Arriendo</option>
          <option value="Cuentas">💡 Cuentas (Luz, Agua, etc)</option>
          <option value="Gasto Hormiga">🐜 Gasto Hormiga</option>
          <option value="Otro">➕ Otro</option>
        </select>
      </div>
      <div class="input-group">
        <label>Descripción corta</label>
        <input type="text" id="main-desc" placeholder="Ej: Compra Lider">
      </div>
      <div class="input-group">
        <label>Monto ($)</label>
        <input type="number" id="main-amount" placeholder="0" inputmode="numeric">
      </div>
      <div style="display:flex; gap:10px; margin-top:20px">
        <button class="btn-cancel" style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--secondary)" onclick="toggleModal('modal-add', false)">Cancelar</button>
        <button class="btn-save" style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white" onclick="handleSave()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Confirmar Borrado -->
  <div class="modal-overlay" id="modal-delete">
    <div class="modal-content" style="text-align:center">
      <h3>¿Borrar registro?</h3>
      <p style="color:#8e8e93; margin:15px 0">Esta acción eliminará el dato de la nube permanentemente.</p>
      <div style="display:flex; gap:10px">
        <button class="btn-cancel" style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--secondary)" onclick="toggleModal('modal-delete', false)">No, volver</button>
        <button style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--danger); color:white" id="confirm-delete-btn">Sí, borrar</button>
      </div>
    </div>
  </div>

  <script>
    // TUS CREDENCIALES
    const SUPABASE_URL = 'https://kthwwocunuxzrhwgpgwn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LAS1lqLjChsBcOAXRR7c0A_JG0U-w6J';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let movements = [];
    let idToDelete = null;
    let pieChart, barChart;

    async function init() {
      const selector = document.getElementById('month-selector');
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const ahora = new Date();
      for(let i = -3; i <= 3; i++) {
        let d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
        let label = `${meses[d.getMonth()]} ${d.getFullYear()}`;
        let el = document.createElement("option");
        el.textContent = label; el.value = label;
        if(i === 0) el.selected = true;
        selector.appendChild(el);
      }
      await fetchData();
    }

    async function fetchData() {
      const selectedMonth = document.getElementById('month-selector').value;
      const { data, error } = await supabaseClient
        .from('movements')
        .select('*')
        .eq('month', selectedMonth)
        .order('id', { ascending: false });

      if (!error) { 
        movements = data; 
        renderList();
        updateCharts(); 
      }
    }

    async function handleSave() {
      const cat = document.getElementById('main-category').value;
      const amount = document.getElementById('main-amount').value;
      const desc = document.getElementById('main-desc').value || cat;
      const month = document.getElementById('month-selector').value;

      if(!amount || amount <= 0) return;

      const { error } = await supabaseClient.from('movements').insert([{
        description: desc,
        detail: cat, 
        amount: Number(amount),
        type: (cat === 'Sueldo' ? 'ingreso' : 'pago'),
        month: month,
        date: new Date().toLocaleDateString('es-CL', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
      }]);

      if(!error) {
        toggleModal('modal-add', false);
        document.getElementById('main-amount').value = '';
        document.getElementById('main-desc').value = '';
        await fetchData();
      }
    }

    function askDelete(id) {
      idToDelete = id;
      toggleModal('modal-delete', true);
    }

    document.getElementById('confirm-delete-btn').onclick = async () => {
      await supabaseClient.from('movements').delete().eq('id', idToDelete);
      toggleModal('modal-delete', false);
      await fetchData();
    };

    function renderList() {
      const ing = movements.filter(m => m.type === 'ingreso').reduce((a, b) => a + b.amount, 0);
      const gas = movements.filter(m => m.type === 'pago').reduce((a, b) => a + b.amount, 0);
      
      document.getElementById('total-balance').textContent = `$${(ing - gas).toLocaleString('es-CL')}`;

      const list = document.getElementById('movement-list');
      if(movements.length === 0) {
        list.innerHTML = '<p style="text-align:center; color:#8e8e93; padding:20px;">Sin movimientos este mes.</p>';
        return;
      }

      list.innerHTML = movements.map(m => `
        <div class="movement-item">
          <div class="m-info">
            <span class="m-name">${m.description}</span>
            <span class="m-date">🗓️ ${m.date} • ${m.detail}</span>
          </div>
          <div style="display:flex; align-items:center; gap:15px">
            <span class="m-amount" style="color:${m.type==='ingreso'?'var(--success)':'var(--primary)'}">
              ${m.type==='ingreso'?'+':'-'}$${m.amount.toLocaleString('es-CL')}
            </span>
            <span style="color:#d2d2d7; cursor:pointer" onclick="askDelete(${m.id})">✕</span>
          </div>
        </div>
      `).join('');
    }

    function switchView(viewName, btn) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');
      btn.classList.add('active');
      if(viewName === 'stats') updateCharts();
    }

    function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }

    // --- LÓGICA DE GRÁFICOS ---
    async function updateCharts() {
      // 1. Gráfico de Torta (Gastos por Categoría)
      const gastos = movements.filter(m => m.type === 'pago');
      const cats = [...new Set(gastos.map(m => m.detail))];
      const dataPie = cats.map(c => gastos.filter(m => m.detail === c).reduce((a,b) => a + b.amount, 0));

      if(pieChart) pieChart.destroy();
      const ctxPie = document.getElementById('pieChart').getContext('2d');
      pieChart = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
          labels: cats,
          datasets: [{ data: dataPie, backgroundColor: ['#007aff', '#34c759', '#ff9500', '#ff3b30', '#5856d6', '#ff2d55'] }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
      });

      // 2. Gráfico de Histórico (Últimos 4 meses)
      const { data: allData } = await supabaseClient.from('movements').select('month, type, amount');
      const ultimosMeses = [...new Set(allData.map(d => d.month))].slice(-4);
      
      const ingresosMes = ultimosMeses.map(mes => allData.filter(d => d.month === mes && d.type === 'ingreso').reduce((a,b) => a + b.amount, 0));
      const gastosMes = ultimosMeses.map(mes => allData.filter(d => d.month === mes && d.type === 'pago').reduce((a,b) => a + b.amount, 0));

      if(barChart) barChart.destroy();
      const ctxBar = document.getElementById('barChart').getContext('2d');
      barChart = new Chart(ctxBar, {
        type: 'bar',
        data: {
          labels: ultimosMeses.map(m => m.split(' ')[0]),
          datasets: [
            { label: 'Ingresos', data: ingresosMes, backgroundColor: '#34c759' },
            { label: 'Gastos', data: gastosMes, backgroundColor: '#ff3b30' }
          ]
        },
        options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { display: false } } } }
      });
    }

    init();
  </script>
</body>
</html>
