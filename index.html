<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cuentas Cris&Nico ❤️</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #000000;
      --secondary: #f2f2f7;
      --accent: #007aff;
      --success: #34c759;
      --danger: #ff3b30;
      --warning: #ffcc00;
      --bg: #f8f9fa;
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg); color: #1c1c1e; padding-bottom: 100px; }

    .main-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }

    @media (min-width: 900px) {
      .main-wrapper { grid-template-columns: 350px 1fr 350px; padding: 40px; height: 100vh; }
      .scroll-section { overflow-y: auto; padding-right: 10px; }
      .nav-bar { display: none !important; }
    }

    .view { display: none; width: 100%; }
    .view.active { display: block; }
    @media (min-width: 900px) { .view { display: block !important; } }

    header { margin-bottom: 25px; }
    header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    
    .month-select { border: none; background: white; padding: 10px 15px; border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

    .card { background: white; border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    
    /* Mercadería Styles */
    .grocery-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--secondary); border-radius: 12px; margin-bottom: 8px; }
    .grocery-info { display: flex; flex-direction: column; }
    .budget-bar-container { background: #e5e5e7; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
    .budget-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

    /* Estilos Generales */
    .mini-card { background: var(--secondary); padding: 15px; border-radius: var(--radius-md); text-align: left; }
    .mini-card span { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; }
    .mini-card div { font-size: 16px; font-weight: 800; margin-top: 5px; }

    .movement-item { padding: 14px; background: #fff; border-radius: var(--radius-md); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f2f2f7; }
    
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #e5e5e7; z-index: 1000; }
    .nav-item { border: none; background: none; color: #8e8e93; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .nav-item.active { color: var(--accent); }

    .fab { position: fixed; bottom: 110px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 28px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 900; }
  </style>
</head>
<body>

  <div class="main-wrapper">
    
    <!-- VISTA 1: DASHBOARD -->
    <div id="view-stats" class="view active scroll-section">
      <header>
        <h1>Cris&Nico ❤️</h1>
        <select id="month-selector" class="month-select" onchange="fetchData()"></select>
      </header>
      <div class="card" style="background: var(--primary); color: white;">
        <span>Balance Neto</span>
        <div id="total-balance" style="font-size: 32px; font-weight: 800;">$0</div>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="mini-card"><span>Gastado</span><div id="stat-spent" style="color:var(--danger)">$0</div></div>
        <div class="mini-card"><span>Ahorro</span><div id="stat-save-rate">0%</div></div>
      </div>
      <div class="card" style="margin-top:20px">
        <canvas id="pieChart" style="max-height: 200px;"></canvas>
      </div>
    </div>

    <!-- VISTA 2: LISTA DE GASTOS -->
    <div id="view-list" class="view scroll-section">
      <h2 style="margin-bottom:20px">Movimientos Realizados</h2>
      <div id="movement-list"></div>
    </div>

    <!-- VISTA 3: PLAN MERCADERÍA -->
    <div id="view-grocery" class="view scroll-section">
      <h2 style="margin-bottom:20px">Plan Mercadería 🛒</h2>
      
      <div class="card">
        <span style="font-size: 13px; font-weight: 700; color: #8e8e93;">PRESUPUESTO VS REAL</span>
        <div class="budget-bar-container">
          <div id="budget-bar" class="budget-bar-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 700;">
          <span id="label-plan">Plan: $0</span>
          <span id="label-real" style="color: var(--accent);">Real: $0</span>
        </div>
        <p id="budget-status" style="font-size: 11px; margin-top: 10px; color: #8e8e93;"></p>
      </div>

      <div class="card">
        <h4 style="margin-bottom:15px">¿Qué falta comprar?</h4>
        <div id="grocery-items-list"></div>
        <button class="mini-card" style="width: 100%; border: 1px dashed #d2d2d7; margin-top: 10px; cursor: pointer;" onclick="toggleModal('modal-grocery', true)">
          + Agregar al plan
        </button>
      </div>
    </div>

  </div>

  <button class="fab" onclick="toggleModal('modal-add', true)">+</button>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="switchView('stats', this)"><span>📊</span><span>Dashboard</span></button>
    <button class="nav-item" onclick="switchView('list', this)"><span>💸</span><span>Lista</span></button>
    <button class="nav-item" onclick="switchView('grocery', this)"><span>🛒</span><span>Plan 🛒</span></button>
  </nav>

  <!-- MODAL GASTO GENERAL -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal-content" style="background: white; padding: 30px; border-radius: 28px; width: 90%; max-width: 400px;">
      <h3>Nuevo Gasto/Ingreso</h3>
      <br>
      <select id="main-category" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
        <option value="Sueldo">💰 Sueldo</option>
        <option value="Supermercado">🛒 Supermercado</option>
        <option value="Cuentas">💡 Cuentas</option>
        <option value="Otro">➕ Otro</option>
      </select>
      <input type="text" id="main-desc" placeholder="Descripción" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
      <input type="number" id="main-amount" placeholder="Monto" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:1px solid #ddd;">
      <button onclick="handleSave()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700;">Guardar</button>
      <button onclick="toggleModal('modal-add', false)" style="width:100%; padding:10px; background:none; border:none; color:#888; margin-top:10px;">Cancelar</button>
    </div>
  </div>

  <!-- MODAL PLAN MERCADERÍA -->
  <div class="modal-overlay" id="modal-grocery">
    <div class="modal-content" style="background: white; padding: 30px; border-radius: 28px; width: 90%; max-width: 400px;">
      <h3>Añadir al Plan 🛒</h3>
      <br>
      <input type="text" id="g-name" placeholder="Item (ej: Pack Fideos)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd;">
      <input type="number" id="g-price" placeholder="Precio estimado" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:1px solid #ddd;">
      <button onclick="saveGroceryPlan()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:700;">Añadir al Presupuesto</button>
      <button onclick="toggleModal('modal-grocery', false)" style="width:100%; padding:10px; background:none; border:none; color:#888; margin-top:10px;">Cerrar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kthwwocunuxzrhwgpgwn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LAS1lqLjChsBcOAXRR7c0A_JG0U-w6J';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let movements = [];
    let groceryPlan = [];
    let pieChart;

    async function init() {
      const selector = document.getElementById('month-selector');
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const ahora = new Date();
      for(let i = -2; i <= 2; i++) {
        let d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
        let label = `${meses[d.getMonth()]} ${d.getFullYear()}`;
        let el = document.createElement("option");
        el.textContent = label; el.value = label;
        if(i === 0) el.selected = true;
        selector.appendChild(el);
      }
      await fetchData();
    }

    async function fetchData() {
      const month = document.getElementById('month-selector').value;
      
      const { data: mData } = await supabaseClient.from('movements').select('*').eq('month', month).order('id', {ascending:false});
      const { data: gData } = await supabaseClient.from('grocery_plan').select('*').eq('month', month);

      movements = mData || [];
      groceryPlan = gData || [];
      renderAll();
    }

    async function saveGroceryPlan() {
      const name = document.getElementById('g-name').value;
      const price = document.getElementById('g-price').value;
      const month = document.getElementById('month-selector').value;

      if(!name || !price) return;

      await supabaseClient.from('grocery_plan').insert([{ item_name: name, estimated_price: Number(price), month: month }]);
      toggleModal('modal-grocery', false);
      fetchData();
    }

    async function deleteGrocery(id) {
      await supabaseClient.from('grocery_plan').delete().eq('id', id);
      fetchData();
    }

    function renderAll() {
      // 1. Dashboard Logic
      const ing = movements.filter(m => m.type === 'ingreso').reduce((a, b) => a + b.amount, 0);
      const gas = movements.filter(m => m.type === 'pago').reduce((a, b) => a + b.amount, 0);
      document.getElementById('total-balance').textContent = `$${(ing - gas).toLocaleString('es-CL')}`;
      document.getElementById('stat-spent').textContent = `$${gas.toLocaleString('es-CL')}`;

      // 2. Grocery Comparison Logic
      const totalPlan = groceryPlan.reduce((a, b) => a + b.estimated_price, 0);
      const totalRealSuper = movements.filter(m => m.detail === 'Supermercado').reduce((a, b) => a + b.amount, 0);
      
      document.getElementById('label-plan').textContent = `Plan: $${totalPlan.toLocaleString('es-CL')}`;
      document.getElementById('label-real').textContent = `Real: $${totalRealSuper.toLocaleString('es-CL')}`;
      
      const percent = totalPlan > 0 ? Math.min((totalRealSuper / totalPlan) * 100, 100) : 0;
      document.getElementById('budget-bar').style.width = percent + '%';
      document.getElementById('budget-bar').style.background = totalRealSuper > totalPlan ? 'var(--danger)' : 'var(--accent)';
      
      const diff = totalPlan - totalRealSuper;
      document.getElementById('budget-status').textContent = diff >= 0 
        ? `✅ Te quedan $${diff.toLocaleString('es-CL')} del presupuesto.` 
        : `⚠️ Te pasaste por $${Math.abs(diff).toLocaleString('es-CL')}!`;

      // Render Lists
      renderLists(totalRealSuper);
      updateChart();
    }

    function renderLists(totalRealSuper) {
      // Lista movimientos
      document.getElementById('movement-list').innerHTML = movements.map(m => `
        <div class="movement-item">
          <div><b>${m.description}</b><br><small>${m.date} • ${m.detail}</small></div>
          <div style="color:${m.type==='ingreso'?'var(--success)':'var(--primary)'}; font-weight:800;">
            ${m.type==='ingreso'?'+':'-'}$${m.amount.toLocaleString('es-CL')}
          </div>
        </div>
      `).join('');

      // Lista Items Planificados
      document.getElementById('grocery-items-list').innerHTML = groceryPlan.map(g => `
        <div class="grocery-item">
          <div class="grocery-info">
            <span style="font-weight:700">${g.item_name}</span>
            <span style="font-size:12px; color:#888">Estimado: $${g.estimated_price.toLocaleString('es-CL')}</span>
          </div>
          <button onclick="deleteGrocery(${g.id})" style="background:none; border:none; color:#d2d2d7">✕</button>
        </div>
      `).join('');
    }

    async function handleSave() {
      const cat = document.getElementById('main-category').value;
      const amount = document.getElementById('main-amount').value;
      const desc = document.getElementById('main-desc').value || cat;
      const month = document.getElementById('month-selector').value;
      if(!amount) return;

      await supabaseClient.from('movements').insert([{
        description: desc, detail: cat, amount: Number(amount),
        type: (cat === 'Sueldo' ? 'ingreso' : 'pago'),
        month: month, date: new Date().toLocaleDateString('es-CL', {day:'2-digit', month:'2-digit'})
      }]);
      toggleModal('modal-add', false);
      fetchData();
    }

    function switchView(viewName, btn) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');
      btn.classList.add('active');
    }

    function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }

    function updateChart() {
      const gastos = movements.filter(m => m.type === 'pago');
      const cats = [...new Set(gastos.map(m => m.detail))];
      const dataPie = cats.map(c => gastos.filter(m => m.detail === c).reduce((a,b) => a + b.amount, 0));
      if(pieChart) pieChart.destroy();
      pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: cats, datasets: [{ data: dataPie, backgroundColor: ['#007aff', '#34c759', '#ff9500', '#ff3b30'] }] },
        options: { plugins: { legend: { position: 'bottom' } } }
      });
    }

    init();
  </script>
</body>
</html>
