<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cuentas Cris&Nico ❤️</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #000000;
      --secondary: #f2f2f7;
      --accent: #007aff;
      --success: #34c759;
      --danger: #ff3b30;
      --bg: #f8f9fa;
      --radius-lg: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    
    body { background-color: var(--bg); color: #1c1c1e; overflow-x: hidden; }
    body.modal-open { overflow: hidden; } /* Evita scroll al abrir modal */

    /* LAYOUT PRINCIPAL RESPONSIVO */
    .app-wrapper {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    @media (min-width: 1024px) {
      .app-wrapper {
        grid-template-columns: 320px 1fr 320px; /* 3 Columnas perfectas */
        padding: 40px;
      }
      .nav-bar { display: none !important; } /* Ocultar nav móvil en PC */
    }

    /* TARJETAS ESTILO APPLE */
    .card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    header h1 { font-size: 26px; font-weight: 800; margin-bottom: 15px; }

    /* MODALES CORREGIDOS (Solución a image_5033c4.png) */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 450px;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }

    /* FORMULARIOS EFICIENTES */
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #8e8e93; margin-bottom: 8px; text-transform: uppercase; }
    .input-group input, .input-group select {
      width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #e5e5e7;
      background: var(--secondary); font-size: 16px; outline: none; transition: 0.2s;
    }
    .input-group input:focus { border-color: var(--accent); background: white; }

    .btn-main {
      width: 100%; padding: 18px; border-radius: 16px; border: none;
      font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-ghost { background: none; color: #8e8e93; margin-top: 10px; }

    /* BARRA DE PROGRESO MERCADERÍA */
    .progress-container { background: var(--secondary); height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 1s ease; }

    /* MOVIMIENTOS */
    .m-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 0; border-bottom: 1px solid #f2f2f7;
    }
    .m-info b { display: block; font-size: 15px; }
    .m-info span { font-size: 12px; color: #8e8e93; }

    /* FAB Y NAV MÓVIL (image_82a392.png) */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; padding: 15px 0 35px;
      border-top: 1px solid #e5e5e7; z-index: 1000;
    }
    .nav-btn { background: none; border: none; color: #8e8e93; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .nav-btn.active { color: var(--accent); }

    .fab {
      position: fixed; bottom: 100px; right: 20px;
      background: var(--primary); color: white; width: 60px; height: 60px;
      border-radius: 30px; border: none; font-size: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 900;
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    
    <!-- COLUMNA 1: DASHBOARD -->
    <div id="col-dash">
      <header>
        <h1>Cris&Nico ❤️</h1>
        <select id="month-selector" class="input-group" style="padding: 8px; width: auto;" onchange="fetchData()"></select>
      </header>

      <div class="card" style="background: var(--primary); color: white;">
        <span style="opacity: 0.7; font-size: 12px;">Balance Neto</span>
        <div id="total-balance" style="font-size: 32px; font-weight: 800;">$0</div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="card" style="padding: 15px;">
          <span style="font-size: 10px; color:#8e8e93;">GASTADO</span>
          <div id="stat-spent" style="font-weight: 800; color: var(--danger);">$0</div>
        </div>
        <div class="card" style="padding: 15px;">
          <span style="font-size: 10px; color:#8e8e93;">AHORRO</span>
          <div id="stat-save" style="font-weight: 800; color: var(--success);">0%</div>
        </div>
      </div>

      <div class="card">
        <canvas id="pieChart" style="max-height: 180px;"></canvas>
      </div>
    </div>

    <!-- COLUMNA 2: LISTA (HISTORIAL) -->
    <div id="col-list">
      <h3 style="margin-bottom: 15px;">Movimientos Realizados</h3>
      <div class="card" id="movement-list" style="min-height: 300px;">
        <!-- Items aquí -->
      </div>
    </div>

    <!-- COLUMNA 3: PLANIFICADOR -->
    <div id="col-plan">
      <h3 style="margin-bottom: 15px;">Plan Mercadería 🛒</h3>
      <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 700;">
          <span>Presupuesto</span>
          <span id="label-diff" style="color: var(--accent);">$0</span>
        </div>
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
        <p id="budget-msg" style="font-size: 11px; color: #8e8e93;"></p>
      </div>

      <div id="grocery-list">
        <!-- Items de mercadería -->
      </div>
      
      <button class="btn-main" style="background: white; border: 1px dashed #d2d2d7; color: #8e8e93;" onclick="openModal('modal-grocery')">
        + Agregar al Plan
      </button>
    </div>

  </div>

  <!-- NAVEGACIÓN MÓVIL -->
  <nav class="nav-bar">
    <button class="nav-btn active" onclick="showSection('col-dash', this)"><span>📊</span>Dashboard</button>
    <button class="nav-btn" onclick="showSection('col-list', this)"><span>💸</span>Lista</button>
    <button class="nav-btn" onclick="showSection('col-plan', this)"><span>🛒</span>Plan</button>
  </nav>

  <button class="fab" onclick="openModal('modal-add')">+</button>

  <!-- MODAL 1: NUEVO GASTO -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal-content">
      <h2 style="margin-bottom: 20px;">Nuevo Gasto/Ingreso</h2>
      <div class="input-group">
        <label>Categoría</label>
        <select id="m-cat">
          <option value="Sueldo">💰 Sueldo</option>
          <option value="Supermercado">🛒 Supermercado</option>
          <option value="Cuentas">💡 Cuentas</option>
          <option value="Salidas">🍻 Salidas</option>
          <option value="Otro">➕ Otro</option>
        </select>
      </div>
      <div class="input-group">
        <label>Descripción</label>
        <input type="text" id="m-desc" placeholder="Ej: Lider o Bono">
      </div>
      <div class="input-group">
        <label>Monto</label>
        <input type="number" id="m-amount" placeholder="$ 0" inputmode="numeric">
      </div>
      <button class="btn-main btn-primary" onclick="saveMovement()">Guardar Registro</button>
      <button class="btn-main btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
  </div>

  <!-- MODAL 2: NUEVO PLAN -->
  <div class="modal-overlay" id="modal-grocery">
    <div class="modal-content">
      <h2 style="margin-bottom: 20px;">Añadir al Plan 🛒</h2>
      <div class="input-group">
        <label>Producto</label>
        <input type="text" id="g-name" placeholder="Ej: Pack de tallarines">
      </div>
      <div class="input-group">
        <label>Precio estimado</label>
        <input type="number" id="g-price" placeholder="$ 0" inputmode="numeric">
      </div>
      <button class="btn-main btn-accent" onclick="saveGrocery()">Añadir al Presupuesto</button>
      <button class="btn-main btn-ghost" onclick="closeModal()">Cerrar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kthwwocunuxzrhwgpgwn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LAS1lqLjChsBcOAXRR7c0A_JG0U-w6J';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let movements = [];
    let groceryPlan = [];
    let myChart;

    // INICIALIZACIÓN
    async function init() {
      const sel = document.getElementById('month-selector');
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const hoy = new Date();
      for(let i = -2; i <= 2; i++) {
        let d = new Date(hoy.getFullYear(), hoy.getMonth() + i, 1);
        let opt = document.createElement("option");
        opt.value = `${meses[d.getMonth()]} ${d.getFullYear()}`;
        opt.textContent = opt.value;
        if(i === 0) opt.selected = true;
        sel.appendChild(opt);
      }
      await fetchData();
    }

    async function fetchData() {
      const month = document.getElementById('month-selector').value;
      const { data: m } = await supabaseClient.from('movements').select('*').eq('month', month).order('id', {ascending:false});
      const { data: g } = await supabaseClient.from('grocery_plan').select('*').eq('month', month);
      movements = m || [];
      groceryPlan = g || [];
      render();
    }

    // MODALES
    function openModal(id) {
      document.getElementById(id).classList.add('active');
      document.body.classList.add('modal-open');
    }
    function closeModal() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
      document.body.classList.remove('modal-open');
    }

    // GUARDADO
    async function saveMovement() {
      const cat = document.getElementById('m-cat').value;
      const amount = Number(document.getElementById('m-amount').value);
      const desc = document.getElementById('m-desc').value || cat;
      const month = document.getElementById('month-selector').value;
      
      if(!amount) return;
      await supabaseClient.from('movements').insert([{
        description: desc, detail: cat, amount, month,
        type: (cat === 'Sueldo' ? 'ingreso' : 'pago'),
        date: new Date().toLocaleDateString('es-CL', {day:'2-digit', month:'2-digit'})
      }]);
      closeModal();
      fetchData();
    }

    async function saveGrocery() {
      const name = document.getElementById('g-name').value;
      const price = Number(document.getElementById('g-price').value);
      const month = document.getElementById('month-selector').value;
      if(!name || !price) return;
      await supabaseClient.from('grocery_plan').insert([{ item_name: name, estimated_price: price, month: month }]);
      closeModal();
      fetchData();
    }

    // RENDERIZADO
    function render() {
      const ing = movements.filter(m => m.type === 'ingreso').reduce((a, b) => a + b.amount, 0);
      const gas = movements.filter(m => m.type === 'pago').reduce((a, b) => a + b.amount, 0);
      
      document.getElementById('total-balance').textContent = `$${(ing - gas).toLocaleString('es-CL')}`;
      document.getElementById('stat-spent').textContent = `$${gas.toLocaleString('es-CL')}`;
      document.getElementById('stat-save').textContent = ing > 0 ? Math.round(((ing-gas)/ing)*100) + '%' : '0%';

      // Lista movimientos
      document.getElementById('movement-list').innerHTML = movements.map(m => `
        <div class="m-item">
          <div class="m-info"><b>${m.description}</b><span>${m.date} • ${m.detail}</span></div>
          <div style="font-weight:800; color:${m.type==='ingreso'?'var(--success)':'var(--primary)'}">
            ${m.type==='ingreso'?'+':'-'}$${m.amount.toLocaleString('es-CL')}
          </div>
        </div>
      `).join('');

      // Lógica Mercadería
      const totalPlan = groceryPlan.reduce((a,b) => a + b.estimated_price, 0);
      const totalReal = movements.filter(m => m.detail === 'Supermercado').reduce((a,b) => a + b.amount, 0);
      const perc = totalPlan > 0 ? Math.min((totalReal/totalPlan)*100, 100) : 0;
      
      document.getElementById('progress-bar').style.width = perc + '%';
      document.getElementById('label-diff').textContent = `$${totalPlan.toLocaleString('es-CL')}`;
      document.getElementById('budget-msg').textContent = `Has gastado $${totalReal.toLocaleString('es-CL')} de un plan de $${totalPlan.toLocaleString('es-CL')}.`;

      document.getElementById('grocery-list').innerHTML = groceryPlan.map(g => `
        <div class="card" style="padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; font-size:14px;">
          <span>${g.item_name}</span><b>$${g.estimated_price.toLocaleString('es-CL')}</b>
        </div>
      `).join('');

      updateChart();
    }

    function updateChart() {
      const gastos = movements.filter(m => m.type === 'pago');
      const cats = [...new Set(gastos.map(m => m.detail))];
      const data = cats.map(c => gastos.filter(m => m.detail === c).reduce((a,b) => a + b.amount, 0));
      if(myChart) myChart.destroy();
      myChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: cats, datasets: [{ data, backgroundColor: ['#007aff', '#34c759', '#ff9500', '#ff3b30', '#5856d6'] }] },
        options: { plugins: { legend: { display: false } }, cutout: '70%' }
      });
    }

    function showSection(id, btn) {
      if(window.innerWidth < 1024) {
        ['col-dash', 'col-list', 'col-plan'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
    }

    init();
  </script>
</body>
</html>
