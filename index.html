<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cuentas Nico&Cris</title>
  <style>
    :root {
      --primary: #000000;
      --secondary: #f2f2f7;
      --accent: #007aff;
      --success: #34c759;
      --danger: #ff3b30;
      --bg: #f8f9fa;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    body { background-color: var(--bg); color: #1c1c1e; padding: 15px; }

    .app-container { max-width: 500px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); min-height: 95vh; display: flex; flex-direction: column; }
    
    header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; font-weight: 800; }
    
    .month-select { border: none; background: var(--secondary); padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--accent); outline: none; }

    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
    .stat-card { padding: 16px; border-radius: var(--radius); background: var(--secondary); position: relative; overflow: hidden; }
    .stat-card span { display: block; font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
    .stat-card div { font-size: 18px; font-weight: 700; }

    .list-container { flex-grow: 1; }
    .movement-item { padding: 14px 0; border-bottom: 1px solid #f2f2f7; display: flex; justify-content: space-between; align-items: center; }
    .m-info { flex-grow: 1; }
    .m-name { font-weight: 600; font-size: 15px; display: block; }
    .m-detail { font-size: 11px; color: #8e8e93; margin-top: 2px; }
    .m-right { text-align: right; display: flex; align-items: center; gap: 12px; }
    .m-amount { font-weight: 700; font-size: 15px; }
    
    .btn-delete { background: none; border: none; color: #d2d2d7; font-size: 18px; cursor: pointer; padding: 5px; transition: color 0.2s; }
    .btn-delete:hover { color: var(--danger); }

    .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: var(--radius); font-size: 16px; font-weight: 700; margin-top: 20px; cursor: pointer; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 24px; padding: 24px; }
    
    .input-group { margin-bottom: 14px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; color: #8e8e93; margin-bottom: 6px; }
    .input-group select, .input-group input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e5e5e7; background: var(--secondary); font-size: 15px; }
    
    .sub-panel { background: #f9f9fb; padding: 12px; border-radius: 12px; border: 1px dashed #d2d2d7; margin-top: 10px; display: none; }

    .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 24px; }
    .btn-cancel { padding: 14px; border: none; border-radius: 12px; font-weight: 600; background: #f2f2f7; }
    .btn-save { padding: 14px; border: none; border-radius: 12px; font-weight: 600; background: var(--primary); color: white; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Nico & Cris</h1>
      <select id="month-selector" class="month-select" onchange="render()"></select>
    </header>

    <div class="summary-grid" id="summary"></div>

    <div class="list-container" id="movement-list"></div>

    <button class="btn-add" onclick="toggleModal(true)">+ Nuevo Movimiento</button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="input-group">
        <label>Categoría</label>
        <select id="main-category" onchange="handleCategoryChange(this.value)">
          <option value="Sueldo">💰 Sueldo</option>
          <option value="Arriendo">🏠 Arriendo</option>
          <option value="Supermercado">🛒 Supermercado</option>
          <option value="Cuentas">💡 Cuentas (Luz, Agua, Gas)</option>
          <option value="Gasto Hormiga">🐜 Gasto Hormiga</option>
          <option value="Otro">➕ Otro...</option>
        </select>
      </div>

      <div id="panel-super" class="sub-panel">
        <input type="text" id="sp-prod" placeholder="¿Qué compraste?" style="margin-bottom:8px">
        <input type="text" id="sp-lugar" placeholder="¿Dónde? (Lider, Jumbo...)">
      </div>

      <div id="panel-cuentas" class="sub-panel">
        <select id="ct-tipo">
          <option value="Agua">💧 Agua</option>
          <option value="Electricidad">⚡ Electricidad</option>
          <option value="Gas">🔥 Gas</option>
        </select>
      </div>

      <div id="panel-otro" class="sub-panel" style="display:block;">
        <input type="text" id="ot-desc" placeholder="Descripción corta">
      </div>

      <div class="input-group" style="margin-top:15px;">
        <label>Monto ($)</label>
        <input type="number" id="main-amount" placeholder="0" inputmode="numeric">
      </div>

      <div class="modal-btns">
        <button class="btn-cancel" onclick="toggleModal(false)">Cancelar</button>
        <button class="btn-save" onclick="handleSave()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    let movements = JSON.parse(localStorage.getItem('cuentas_v5')) || [];

    function init() {
      const selector = document.getElementById('month-selector');
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const ahora = new Date();
      
      for(let i = -3; i <= 6; i++) {
        let d = new Date(ahora.getFullYear(), ahora.getMonth() + i, 1);
        let label = `${meses[d.getMonth()]} ${d.getFullYear()}`;
        let el = document.createElement("option");
        el.textContent = label; el.value = label;
        if(i === 0) el.selected = true;
        selector.appendChild(el);
      }
      render();
    }

    function handleCategoryChange(val) {
      document.getElementById('panel-super').style.display = (val === 'Supermercado') ? 'block' : 'none';
      document.getElementById('panel-cuentas').style.display = (val === 'Cuentas') ? 'block' : 'none';
      document.getElementById('panel-otro').style.display = (val === 'Supermercado' || val === 'Cuentas') ? 'none' : 'block';
    }

    function toggleModal(show) {
      document.getElementById('modal-overlay').classList.toggle('active', show);
    }

    function handleSave() {
      const cat = document.getElementById('main-category').value;
      const amount = document.getElementById('main-amount').value;
      const month = document.getElementById('month-selector').value;

      if(!amount) return alert("Pon un monto");

      let desc = cat;
      let detail = "";
      let type = (cat === 'Sueldo') ? 'ingreso' : 'pago';

      if(cat === 'Supermercado') {
        desc = document.getElementById('sp-prod').value || "Supermercado";
        detail = document.getElementById('sp-lugar').value;
      } else if(cat === 'Cuentas') {
        desc = "Cuenta " + document.getElementById('ct-tipo').value;
      } else {
        desc = document.getElementById('ot-desc').value || cat;
      }

      movements.unshift({
        id: Date.now(),
        description: desc,
        detail: detail,
        amount: Number(amount),
        type: type,
        month: month,
        date: new Date().toLocaleDateString('es-CL', {day:'2-digit', month:'2-digit'})
      });

      saveAndRender();
      toggleModal(false);
      // Limpiar campos
      document.querySelectorAll('input').forEach(i => i.value = '');
    }

    function deleteItem(id) {
      if(confirm("¿Seguro que quieres borrar este gasto?")) {
        movements = movements.filter(m => m.id !== id);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem('cuentas_v5', JSON.stringify(movements));
      render();
    }

    function render() {
      const selectedMonth = document.getElementById('month-selector').value;
      const filtered = movements.filter(m => m.month === selectedMonth);
      
      const ing = filtered.filter(m => m.type === 'ingreso').reduce((a, b) => a + b.amount, 0);
      const gas = filtered.filter(m => m.type === 'pago').reduce((a, b) => a + b.amount, 0);

      document.getElementById('summary').innerHTML = `
        <div class="stat-card"><span>Balance</span><div style="color:${(ing-gas)>=0?'var(--success)':'var(--danger)'}">$${(ing - gas).toLocaleString('es-CL')}</div></div>
        <div class="stat-card"><span>Gastado</span><div style="color:var(--primary)">$${gas.toLocaleString('es-CL')}</div></div>
      `;

      const list = document.getElementById('movement-list');
      if(filtered.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:40px; color:#aeaeb2;">Sin movimientos en ${selectedMonth}</div>`;
        return;
      }

      list.innerHTML = filtered.map(m => `
        <div class="movement-item">
          <div class="m-info">
            <span class="m-name">${m.description}</span>
            <span class="m-detail">${m.date} ${m.detail ? '• ' + m.detail : ''}</span>
          </div>
          <div class="m-right">
            <span class="m-amount" style="color:${m.type==='ingreso'?'var(--success)':'var(--primary)'}">
              ${m.type==='ingreso'?'+':'-'}$${m.amount.toLocaleString('es-CL')}
            </span>
            <button class="btn-delete" onclick="deleteItem(${m.id})">✕</button>
          </div>
        </div>
      `).join('');
    }

    init();
  </script>
</body>
</html>
